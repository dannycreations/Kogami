name: Prefetch Exchange Rates

on:
  schedule:
    - cron: '0 12 * * 3'

jobs:
  prefetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run prefetch script
        run: bun scripts/prefetch.ts

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/exchange-rates.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): update exchange rates" && git push)
